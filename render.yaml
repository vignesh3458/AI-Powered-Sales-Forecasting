services:
  - type: web
    name: sales-forecast-api
    runtime: python

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
        